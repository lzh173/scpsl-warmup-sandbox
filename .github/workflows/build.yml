name: Build

on:
  push:
    branches: [main]
    paths:
      - 'ScpslPluginStarter/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore NuGet packages
        run: dotnet restore ScpslPluginStarter/ScpslPluginStarter.csproj

      - name: Build
        run: dotnet build ScpslPluginStarter/ScpslPluginStarter.csproj --configuration Release --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScpslPluginStarter
          path: |
            ScpslPluginStarter/bin/Release/net48/ScpslPluginStarter.dll
            ScpslPluginStarter/bin/Release/net48/0Harmony.dll
