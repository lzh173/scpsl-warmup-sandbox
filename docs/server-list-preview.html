<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCP:SL Server Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      background: #11151b;
      color: #edf2f7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 25% 15%, rgba(57, 125, 255, 0.18), transparent 35%),
        radial-gradient(circle at 78% 20%, rgba(255, 80, 50, 0.13), transparent 34%),
        #101319;
    }

    main {
      width: min(1180px, calc(100vw - 40px));
      display: grid;
      gap: 22px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
    }

    .server-list,
    .details {
      border: 1px solid #394251;
      background: rgba(21, 27, 36, 0.94);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
    }

    .list-header,
    .server-row {
      display: grid;
      grid-template-columns: 1fr 110px 110px 130px;
      gap: 12px;
      align-items: center;
      padding: 13px 18px;
    }

    .list-header {
      color: #91a0b3;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #1b222d;
      border-bottom: 1px solid #394251;
    }

    .server-row {
      min-height: 86px;
      background: linear-gradient(90deg, rgba(44, 82, 130, 0.28), rgba(30, 38, 50, 0.72));
      border-left: 4px solid #5eead4;
    }

    .title {
      font-size: 20px;
      line-height: 1.18;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 1px 0 #000;
    }

    .tag {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 8px;
      border: 1px solid rgba(94, 234, 212, 0.7);
      color: #a7f3d0;
      font-size: 12px;
      font-weight: 700;
    }

    .value {
      font-weight: 800;
      color: #dbeafe;
    }

    .details {
      padding: 22px 26px;
    }

    .details h2 {
      margin: 0 0 14px;
      font-size: 22px;
      color: #ffffff;
    }

    .description {
      white-space: pre-wrap;
      line-height: 1.65;
      color: #d6deea;
      font-size: 16px;
    }

    .note {
      color: #8fa0b5;
      font-size: 13px;
      margin-top: 14px;
    }

    .editor {
      border: 1px solid #394251;
      background: rgba(18, 23, 31, 0.96);
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
    }

    .editor h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #aab8ca;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #465365;
      background: #0f141c;
      color: #f8fafc;
      font: inherit;
      padding: 10px 11px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #5eead4;
      box-shadow: 0 0 0 2px rgba(94, 234, 212, 0.16);
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      line-height: 1.5;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #56667a;
      background: #1c2633;
      color: #f8fafc;
      font: inherit;
      font-weight: 800;
      padding: 9px 13px;
      cursor: pointer;
    }

    button:hover {
      background: #263345;
    }

    @media (max-width: 780px) {
      .list-header,
      .server-row,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>服务器列表预览</h1>

    <section class="editor" aria-label="Preview editor">
      <h2>编辑预览</h2>
      <div class="form-grid">
        <label>
          服务器名称
          <input id="edit-title" value="<color=#ff3333><b>[CN]</b></color> <color=#00ffff><b>[公测]</b></color> <color=#ffff00><b>人机战斗服</b></color>">
        </label>
        <label>
          标签
          <input id="edit-tag" value="练枪 / 人机 / 练习控制台">
        </label>
        <label>
          玩家数
          <input id="edit-players" value="0 / 50">
        </label>
        <label>
          延迟/地区
          <input id="edit-region" value="北京">
        </label>
        <label>
          版本
          <input id="edit-version" value="14.2.6">
        </label>
        <label class="wide">
          服务器介绍
          <textarea id="edit-description">&lt;size=125%&gt;&lt;color=#ff3333&gt;&lt;b&gt;[CN]&lt;/b&gt;&lt;/color&gt; &lt;color=#00ffff&gt;&lt;b&gt;[公测]&lt;/b&gt;&lt;/color&gt; &lt;color=#ffff00&gt;&lt;b&gt;人机战斗服&lt;/b&gt;&lt;/color&gt;&lt;/size&gt;
&lt;color=#00ff88&gt;&lt;b&gt;人人都能使用控制台！&lt;/b&gt;&lt;/color&gt;
&lt;color=#ffcc00&gt;控制台仅可刷取物品、切换阵营与传送；设有冷却时间，不开放其他管理功能。&lt;/color&gt;

&lt;color=#ffcc00&gt;&lt;b&gt;人机练枪 / SCP 练习 / 公共控制台&lt;/b&gt;&lt;/color&gt;

&lt;color=#66ff99&gt;进服即可开练，空服也有机器人陪打。&lt;/color&gt;

&lt;align=center&gt;&lt;color=#ff6633&gt;&lt;b&gt;==== 服务器特色 ====&lt;/b&gt;&lt;/color&gt;&lt;/align&gt;
&lt;color=#00ff88&gt;1.&lt;/color&gt; 自动生成战斗机器人，适合热身、压枪、走位和 SCP 对抗练习。
&lt;color=#00ff88&gt;2.&lt;/color&gt; 玩家可选择人类装备，也可临时切换为 173 / 939 / 106 / 049 / 096 / 3114。
&lt;color=#00ff88&gt;3.&lt;/color&gt; 所有人都可在 &lt;color=#ffff00&gt;服务器专属设置（Server Specific Settings）&lt;/color&gt; 中使用人机控制台，仅开放换阵营、传送和发物品。
&lt;color=#00ff88&gt;4.&lt;/color&gt; 即使空服也会自动保留少量机器人，随时进服即可开练。

&lt;align=center&gt;&lt;color=#ff6633&gt;&lt;b&gt;==== 常用命令 ====&lt;/b&gt;&lt;/color&gt;&lt;/align&gt;
&lt;color=#ffff00&gt;服务器专属设置（Server Specific Settings）&lt;/color&gt; 打开人机控制台（阵营/物品/传送/机器人）
&lt;color=#ffff00&gt;.help&lt;/color&gt; 查看帮助
&lt;color=#ffff00&gt;.loadout&lt;/color&gt; 选择人类装备
&lt;color=#ffff00&gt;.loadout 939 / 173 / 106 / 049 / 096 / 3114&lt;/color&gt; 临时变成 SCP
&lt;color=#ffff00&gt;.bots setcount 数量&lt;/color&gt; 调整机器人数量

&lt;align=center&gt;&lt;color=#ff3333&gt;&lt;b&gt;==== 注意事项 ====&lt;/b&gt;&lt;/color&gt;&lt;/align&gt;
&lt;color=#ffcc00&gt;本服仍在公测开发中，机器人行为和功能会继续调整。&lt;/color&gt;
请勿恶意刷命令、利用 BUG、干扰他人练习或使用第三方作弊工具。
进入服务器即代表你愿意遵守以上规则。</textarea>
        </label>
      </div>
      <div class="actions">
        <button id="two-line-title-test" type="button">双行标题测试</button>
        <button id="copy-title" type="button">复制标题</button>
        <button id="copy-description" type="button">复制介绍</button>
        <button id="reset-preview" type="button">恢复默认</button>
      </div>
    </section>

    <section class="server-list" aria-label="Server list preview">
      <div class="list-header">
        <span>服务器名称</span>
        <span>玩家</span>
        <span>延迟</span>
        <span>版本</span>
      </div>
      <div class="server-row">
        <div>
          <div id="preview-title" class="title"><span style="color:#ff3333"><b>[CN]</b></span> <span style="color:#00ffff"><b>[公测]</b></span> <span style="color:#ffff00"><b>人机战斗服</b></span></div>
          <span id="preview-tag" class="tag">练枪 / 人机 / 练习控制台</span>
        </div>
        <span id="preview-players" class="value">0 / 50</span>
        <span id="preview-region" class="value">北京</span>
        <span id="preview-version" class="value">14.2.6</span>
      </div>
    </section>

    <section class="details" aria-label="Server info preview">
      <h2>服务器介绍</h2>
      <div id="preview-description" class="description"></div>
      <div class="note">这是本地近似预览。实际 SCP:SL 客户端列表的字体、换行和排序会由游戏客户端决定。</div>
    </section>
  </main>
  <script>
    const defaults = {
      title: "<color=#ff3333><b>[CN]</b></color> <color=#00ffff><b>[公测]</b></color> <color=#ffff00><b>人机战斗服</b></color>",
      tag: "练枪 / 人机 / 练习控制台",
      players: "0 / 50",
      region: "北京",
      version: "14.2.6",
      description: document.getElementById("edit-description").value
    };

    const twoLineTitleTest =
      "" +
      "<color=#ffcc00><b>萌新体验极佳!</b></color> | <color=#ff5533><b>丙午马年</b></color> | <color=#ff0044><b>我踏马来辣</b></color> | <color=#ffee99><b>友善环境</b></color> | <color=#33ffee><b>零压力</b></color>";

    const fields = {
      title: document.getElementById("edit-title"),
      tag: document.getElementById("edit-tag"),
      players: document.getElementById("edit-players"),
      region: document.getElementById("edit-region"),
      version: document.getElementById("edit-version"),
      description: document.getElementById("edit-description")
    };

    const preview = {
      title: document.getElementById("preview-title"),
      tag: document.getElementById("preview-tag"),
      players: document.getElementById("preview-players"),
      region: document.getElementById("preview-region"),
      version: document.getElementById("preview-version"),
      description: document.getElementById("preview-description")
    };

    function save() {
      const state = {};
      for (const key of Object.keys(fields)) {
        state[key] = fields[key].value;
      }
      localStorage.setItem("scpsl-server-preview", JSON.stringify(state));
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRichText(value) {
      return escapeHtml(value)
        .replace(/&lt;(\/?)(b|i)&gt;/gi, "<$1$2>")
        .replace(/&lt;color=(#[0-9a-fA-F]{3,8}|[a-zA-Z]+)&gt;/gi, '<span style="color:$1">')
        .replace(/&lt;\/color&gt;/gi, "</span>")
        .replace(/&lt;size=([0-9]{1,3})%&gt;/gi, '<span style="font-size:$1%">')
        .replace(/&lt;\/size&gt;/gi, "</span>")
        .replace(/&lt;br\s*\/?&gt;/gi, "<br>")
        .replace(/&lt;align=center&gt;/gi, '<div style="text-align:center">')
        .replace(/&lt;\/align&gt;/gi, "</div>");
    }

    function render() {
      preview.title.innerHTML = renderRichText(fields.title.value);
      preview.tag.innerHTML = renderRichText(fields.tag.value);
      preview.description.innerHTML = renderRichText(fields.description.value);
      preview.players.textContent = fields.players.value;
      preview.region.textContent = fields.region.value;
      preview.version.textContent = fields.version.value;
      save();
    }

    function load() {
      const raw = localStorage.getItem("scpsl-server-preview");
      if (!raw) {
        render();
        return;
      }

      try {
        const state = JSON.parse(raw);
        for (const key of Object.keys(fields)) {
          fields[key].value = state[key] ?? defaults[key];
        }
      } catch {
        localStorage.removeItem("scpsl-server-preview");
      }

      render();
    }

    for (const field of Object.values(fields)) {
      field.addEventListener("input", render);
    }

    document.getElementById("reset-preview").addEventListener("click", () => {
      for (const key of Object.keys(fields)) {
        fields[key].value = defaults[key];
      }
      render();
    });

    document.getElementById("two-line-title-test").addEventListener("click", () => {
      fields.title.value = twoLineTitleTest;
      fields.players.value = "0 / 30";
      fields.tag.value = "Modded";
      render();
    });

    document.getElementById("copy-title").addEventListener("click", async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(fields.title.value);
          return;
        }
      } catch {
      }

      fields.title.focus();
      fields.title.select();
      document.execCommand("copy");
    });

    document.getElementById("copy-description").addEventListener("click", async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(fields.description.value);
          return;
        }
      } catch {
      }

      fields.description.focus();
      fields.description.select();
      document.execCommand("copy");
    });

    load();
  </script>
</body>
</html>
